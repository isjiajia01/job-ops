# =============================================================================
# Job Ops - Docker Compose Configuration
# =============================================================================

services:
  job-ops:
    image: ${JOBOPS_IMAGE:-ghcr.io/isjiajia01/job-ops:latest}
    container_name: job-ops
    ports:
      - "127.0.0.1:3005:3001"
    volumes:
      # Persist database and generated PDFs
      - ./data:/app/data
    environment:
      # Server config
      - NODE_ENV=production
      - PORT=3001

      # Python path (uses system python in container)
      - PYTHON_PATH=/usr/bin/python3

    env_file:
      - path: ./.env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Volumes for data persistence
volumes:
  data:
