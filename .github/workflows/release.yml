name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Next release version (x.y.z)"
        required: true
        type: string
      release_title:
        description: "Optional release title shown on GitHub (defaults to vX.Y.Z)"
        required: false
        type: string
      image_platforms:
        description: "Docker platforms to publish (comma-separated)"
        required: false
        default: "linux/arm64"
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release version
        id: validate
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be in x.y.z form, got '$RELEASE_VERSION'" >&2
            exit 1
          fi

          CURRENT_VERSION="$(node -p "require('./workspace/package.json').version")"
          if [ "$CURRENT_VERSION" = "$RELEASE_VERSION" ]; then
            echo "Version $RELEASE_VERSION is already set in workspace/package.json"
            echo "version_already_set=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_already_set=false" >> "$GITHUB_OUTPUT"
          fi

          if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag v$RELEASE_VERSION already exists locally"
            echo "tag_already_exists=true" >> "$GITHUB_OUTPUT"
          elif git ls-remote --tags origin "refs/tags/v$RELEASE_VERSION" | grep -q .; then
            echo "Tag v$RELEASE_VERSION already exists on origin"
            echo "tag_already_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump workspace version files
        if: steps.validate.outputs.version_already_set != 'true'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node ./scripts/set-workspace-version.mjs "$RELEASE_VERSION"

      - name: Commit and push version bump
        if: steps.validate.outputs.version_already_set != 'true'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add workspace/package.json package-lock.json
          git commit -m "chore: release $RELEASE_VERSION"
          git push origin HEAD:main

      - name: Create and push release tag
        if: steps.validate.outputs.tag_already_exists != 'true'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git tag "v$RELEASE_VERSION"
          git push origin "v$RELEASE_VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Docker meta (tags/labels)
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/job-ops
          tags: |
            type=raw,value=v${{ inputs.version }}
            type=raw,value=latest
            type=sha

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ inputs.image_platforms }}
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          INPUT_RELEASE_TITLE: ${{ inputs.release_title }}
        run: |
          RELEASE_TITLE="$(printf '%s' "$INPUT_RELEASE_TITLE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$RELEASE_TITLE" ]; then
            RELEASE_TITLE="v$RELEASE_VERSION"
          fi

          if gh release view "v$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release edit "v$RELEASE_VERSION" --title "$RELEASE_TITLE"
          else
            gh release create "v$RELEASE_VERSION" --title "$RELEASE_TITLE" --generate-notes
          fi
