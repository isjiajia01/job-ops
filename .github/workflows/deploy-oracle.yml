name: deploy-oracle

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Compose service to deploy"
        required: false
        default: job-ops
        type: string
      image_tag:
        description: "GHCR image tag to deploy"
        required: false
        default: latest
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-oracle-${{ inputs.service }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_SECURITY_LIST_ID: ${{ secrets.OCI_SECURITY_LIST_ID }}
    steps:
      - name: Detect runner public IP
        id: runner_ip
        run: |
          ip="$(curl -fsSL https://api.ipify.org)"
          echo "ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Install OCI CLI
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure OCI CLI
        env:
          OCI_CLI_PRIVATE_KEY: ${{ secrets.OCI_CLI_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.oci"
          chmod 700 "$HOME/.oci"
          printf '%s\n' "$OCI_CLI_PRIVATE_KEY" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${OCI_CLI_USER}
          fingerprint=${OCI_CLI_FINGERPRINT}
          tenancy=${OCI_CLI_TENANCY}
          region=${OCI_CLI_REGION}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF

      - name: Allow temporary SSH from GitHub runner
        id: allow_ssh
        env:
          RUNNER_CIDR: ${{ steps.runner_ip.outputs.ip }}/32
        run: |
          oci network security-list get \
            --security-list-id "$OCI_SECURITY_LIST_ID" \
            --output json > current-security-list.json

          rule_exists="$(
            jq -r --arg cidr "$RUNNER_CIDR" '
              [
                .data["ingress-security-rules"][]
                | select(
                    .protocol == "6"
                    and .source == $cidr
                    and .["source-type"] == "CIDR_BLOCK"
                    and .["tcp-options"]["destination-port-range"].min == 22
                    and .["tcp-options"]["destination-port-range"].max == 22
                  )
              ] | length > 0
            ' current-security-list.json
          )"

          if [ "$rule_exists" = "true" ]; then
            echo "rule_added=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq --arg cidr "$RUNNER_CIDR" '
            .data["ingress-security-rules"] + [
              {
                "description": "Temporary SSH access for GitHub Actions deploy",
                "icmp-options": null,
                "is-stateless": false,
                "protocol": "6",
                "source": $cidr,
                "source-type": "CIDR_BLOCK",
                "tcp-options": {
                  "destination-port-range": {
                    "max": 22,
                    "min": 22
                  },
                  "source-port-range": null
                },
                "udp-options": null
              }
            ]
          ' current-security-list.json > ingress-rules.json

          oci network security-list update \
            --security-list-id "$OCI_SECURITY_LIST_ID" \
            --ingress-security-rules file://ingress-rules.json \
            --force \
            --wait-for-state AVAILABLE

          echo "rule_added=true" >> "$GITHUB_OUTPUT"

      - name: Deploy on Oracle
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd /opt/job-ops
            IMAGE_TAG='${{ inputs.image_tag }}'
            if [ -z "$IMAGE_TAG" ]; then IMAGE_TAG=latest; fi
            APP_VERSION="${IMAGE_TAG#v}"
            DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            GIT_SHA="${{ github.sha }}"
            export JOBOPS_IMAGE="ghcr.io/${{ github.repository_owner }}/job-ops:$IMAGE_TAG"
            touch .env
            cp .env .env.tmp
            grep -vE '^(JOBOPS_IMAGE|APP_VERSION|GIT_SHA|IMAGE_TAG|DEPLOYED_AT)=' .env.tmp > .env
            printf 'JOBOPS_IMAGE=%s\n' "$JOBOPS_IMAGE" >> .env
            printf 'APP_VERSION=%s\n' "$APP_VERSION" >> .env
            printf 'GIT_SHA=%s\n' "$GIT_SHA" >> .env
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG" >> .env
            printf 'DEPLOYED_AT=%s\n' "$DEPLOYED_AT" >> .env
            rm -f .env.tmp
            echo "Deploying image: $JOBOPS_IMAGE"
            echo "App version: $APP_VERSION"
            echo "Git SHA: $GIT_SHA"
            docker compose pull ${{ inputs.service }}
            docker compose up -d ${{ inputs.service }}
            docker compose ps

      - name: Revoke temporary SSH access
        if: always() && steps.allow_ssh.outputs.rule_added == 'true'
        env:
          RUNNER_CIDR: ${{ steps.runner_ip.outputs.ip }}/32
        run: |
          oci network security-list get \
            --security-list-id "$OCI_SECURITY_LIST_ID" \
            --output json > current-security-list.json

          jq --arg cidr "$RUNNER_CIDR" '
            .data["ingress-security-rules"]
            | map(
                select(
                  .source != $cidr
                  or .protocol != "6"
                  or .["source-type"] != "CIDR_BLOCK"
                  or .["tcp-options"]["destination-port-range"].min != 22
                  or .["tcp-options"]["destination-port-range"].max != 22
                  or .description != "Temporary SSH access for GitHub Actions deploy"
                )
              )
          ' current-security-list.json > ingress-rules.json

          oci network security-list update \
            --security-list-id "$OCI_SECURITY_LIST_ID" \
            --ingress-security-rules file://ingress-rules.json \
            --force \
            --wait-for-state AVAILABLE
