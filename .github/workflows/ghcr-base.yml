name: build-and-push-ghcr-base

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build for the base image"
        required: false
        default: linux/arm64
        type: string
  push:
    branches:
      - main
    paths:
      - Dockerfile.base
      - package.json
      - package-lock.json
      - docs-site/package.json
      - shared/package.json
      - workspace/package.json
      - extractors/**/package.json

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-base-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64,linux/arm64' }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    env:
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      TARGET_PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64,linux/arm64' }}
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/job-ops-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: env.TARGET_PLATFORMS != 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          {
            echo 'tags<<EOF'
            echo "${IMAGE_NAME}:sha-${short_sha}"
            if [ "$TARGET_PLATFORMS" = 'linux/arm64' ]; then
              echo "${IMAGE_NAME}:arm64-latest"
            else
              echo "${IMAGE_NAME}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base
          push: true
          platforms: ${{ env.TARGET_PLATFORMS }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=job-ops-base-${{ env.TARGET_PLATFORMS }}
          cache-to: type=gha,mode=max,scope=job-ops-base-${{ env.TARGET_PLATFORMS }}

      - name: Build summary
        run: |
          echo "Runner: $RUNNER_OS / $RUNNER_ARCH"
          echo "Target platforms: $TARGET_PLATFORMS"
          echo "Published tags:"
          printf '%s\n' '${{ steps.tags.outputs.tags }}'
